<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELEV8 | Premium Calisthenics &amp; Fitness Studio in Goa</title>
<meta name="description" content="ELEV8 is Goa's premium calisthenics and functional fitness studio. Build real strength, mobility and skill with structured coaching for every level. Rated 5.0★ on Google. Book a free trial today.">
<meta name="theme-color" content="#03141A">
<link rel="icon" href="/assets/images/brand/Elev8-icon-symbol.png" type="image/png" sizes="64x64">
<link rel="shortcut icon" href="/assets/images/brand/Elev8-icon-symbol.png">

<meta property="og:type" content="website">
<meta property="og:title" content="ELEV8 | Premium Calisthenics &amp; Fitness Studio in Goa">
<meta property="og:description" content="Build real strength, mobility and skill with structured calisthenics and functional training. Rated 5.0★ on Google.">
<meta property="og:image" content="/assets/images/brand/Elev8-icon-symbol.png">
<meta property="og:locale" content="en_IN">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Loader CSS is linked directly (not JS-imported) so it is available before the loader overlay paints, matching the original blocking <link> behaviour. -->
<link rel="stylesheet" href="/loader/loader.css">

<script>(function(){try{var n=performance.getEntriesByType?performance.getEntriesByType('navigation'):[];var r=n.length&&(n[0].type==='reload'||n[0].type==='back_forward');if(sessionStorage.getItem('elev8LoaderShown')&&!r){document.documentElement.classList.add('no-loader');}}catch(e){}})();</script>
</head>
<body>

<!-- ELEV8 Loader — static markup outside the React tree so it paints before the app bundle hydrates, identical to the original multi-page behaviour. -->
<div class="loader-overlay" id="loaderOverlay" role="progressbar"
     aria-label="Loading ELEV8" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
  <div class="loader-spotlight" aria-hidden="true"></div>
  <div class="particles" id="loader-particles" aria-hidden="true"></div>
  <div class="loader-core">
    <div class="loader-brand"><img src="/assets/images/brand/Elev8-brand-logo.png" alt="ELEV8" class="loader-logo"></div>
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 300 300" aria-hidden="true">
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop class="g-start" offset="0%"></stop>
            <stop class="g-mid"   offset="55%"></stop>
            <stop class="g-end"   offset="100%"></stop>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="150" cy="150" r="98"></circle>
        <circle class="ring-prog"  id="ringProg" cx="150" cy="150" r="98"></circle>
        <circle class="ring-dot"   id="ringDot"  cx="150" cy="52" r="5"></circle>
        <g id="anim-fig">
          <line id="anim-prop" class="fig-prop" x1="118" y1="72" x2="182" y2="72" stroke-width="3"/>
          <g class="limb-glow" stroke-width="17">
            <path id="anim-g-lau" d="M140 54 L138 62"/>
            <path id="anim-g-lal" d="M138 62 L138 72"/>
            <path id="anim-g-rau" d="M160 54 L162 62"/>
            <path id="anim-g-ral" d="M162 62 L162 72"/>
            <path id="anim-g-llu" d="M144 94 L143 122"/>
            <path id="anim-g-lll" d="M143 122 L144 148"/>
            <path id="anim-g-rlu" d="M156 94 L157 122"/>
            <path id="anim-g-rll" d="M157 122 L156 148"/>
          </g>
          <g class="limb" stroke-width="10">
            <path id="anim-lau" d="M140 54 L138 62"/>
            <path id="anim-lal" d="M138 62 L138 72"/>
            <path id="anim-rau" d="M160 54 L162 62"/>
            <path id="anim-ral" d="M162 62 L162 72"/>
            <path id="anim-llu" d="M144 94 L143 122"/>
            <path id="anim-lll" d="M143 122 L144 148"/>
            <path id="anim-rlu" d="M156 94 L157 122"/>
            <path id="anim-rll" d="M157 122 L156 148"/>
          </g>
          <path id="anim-torso" class="fig-torso" d="M140 54 C137 68 142 88 144 94 L156 94 C158 88 163 68 160 54 Z"/>
          <circle id="anim-head" class="fig-head" cx="150" cy="40" r="11"/>
        </g>
      </svg>
    </div>
    <div class="loader-percent" id="loaderPercent">0%</div>
    <div class="loader-message" id="loaderMessage"><span class="msg-inner">Building Strength…</span></div>
    <div class="tracker" id="tracker">
      <div class="track-step active" data-step="0"><span class="dot"></span>Strength</div>
      <div class="track-step" data-step="1"><span class="dot"></span>Control</div>
      <div class="track-step" data-step="2"><span class="dot"></span>Skills</div>
    </div>
  </div>
</div>

<div id="root"></div>

<script src="/bootstrap.bundle.min.js"></script>
<script type="module" src="/src/main.tsx"></script>
<script src="/loader/loader.js"></script>
</body>
</html>
