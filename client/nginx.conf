server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the server container so the browser only ever talks to one origin
    # (matches the dev-mode Vite proxy in vite.config.ts).
    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://server:5000/health;
    }

    # Cache hashed build assets aggressively; index.html itself must always revalidate so
    # SPA users pick up new deploys without a hard refresh.
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
