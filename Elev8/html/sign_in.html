<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Sign in to your ELEV8 account and keep elevating your fitness.">
<meta name="theme-color" content="#03141A">
<link rel="icon" href="../assets/images/common/elev8-icon-symbol.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<video class="background-video" autoplay muted loop playsinline aria-hidden="true">
  <source src="../assets/videos/hero-background-loop.mp4" type="video/mp4">
</video>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" aria-label="Main navigation">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="../assets/images/common/elev8-brand-logo.png" class="logo" alt="ELEV8 Calisthenics & Fitness Studio">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"
            aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="programs.html">Programs</a></li>

        <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>

        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<main id="main" class="auth-container">
  <div class="auth-card">
    <div class="glass-card">

      <!-- Header -->
      <div class="auth-header">
        <span class="eyebrow" style="justify-content:center;">Welcome Back</span>
        <h1 class="auth-title">Sign In</h1>
        <p class="auth-sub">Continue your calisthenics journey.</p>
      </div>

      <form id="signinForm" novalidate autocomplete="on">

        <!-- Email -->
        <div class="elev8-field">
          <input type="email" id="si-email" name="email" placeholder=" "
                 autocomplete="email">
          <label for="si-email">Email Address</label>
          <span class="field-err" id="si-emailErr" role="alert"></span>
        </div>

        <!-- Password -->
        <div class="elev8-field">
          <input type="password" id="si-password" name="password" placeholder=" "
                 autocomplete="current-password">
          <label for="si-password">Password</label>
          <span class="field-err" id="si-passwordErr" role="alert"></span>
        </div>

        <!-- Forgot password link -->
        <div class="auth-meta">
          <a href="#" class="forgot-link"
             onclick="showToast('Password reset coming soon — contact us on WhatsApp.','info'); return false;">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-1" id="signinBtn">
          Sign In
        </button>

        <p class="auth-switch">New to ELEV8?
          <a href="sign_up.html">Create an account</a>
        </p>

        <p class="auth-switch" style="margin-top:0;">
          <a href="delete_account.html" class="text-danger" style="font-size:0.82rem;">
            Delete my account
          </a>
        </p>

      </form>
    </div><!-- /glass-card -->
  </div><!-- /auth-card -->
</main>

<footer>
  <p>© 2026 ELEV8 Calisthenics &amp; Fitness Studio · Goa, India</p>
  <div class="social-links">
    <a href="https://www.instagram.com/elev8.goa/" target="_blank" rel="noopener noreferrer">Instagram</a>
    <a href="https://wa.me/917066131474" target="_blank" rel="noopener noreferrer">WhatsApp</a>
  </div>
</footer>

<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
