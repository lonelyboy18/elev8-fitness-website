<main id="main" class="auth-container">
  <div class="auth-card">
    <div class="glass-card">

      <!-- Header -->
      <div class="auth-header">
        <span class="eyebrow" style="justify-content:center;">Begin Your Journey</span>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Join Goa's premium calisthenics studio.</p>
      </div>

      <form id="signupForm" novalidate autocomplete="off">

        <!-- Name -->
        <div class="elev8-field">
          <input type="text" id="su-name" name="name" placeholder=" "
                 autocomplete="name" maxlength="120">
          <label for="su-name">Full Name</label>
          <span class="field-err" id="su-nameErr" role="alert"></span>
        </div>

        <!-- Email -->
        <div class="elev8-field">
          <input type="email" id="su-email" name="email" placeholder=" "
                 autocomplete="email">
          <label for="su-email">Email Address</label>
          <span class="field-err" id="su-emailErr" role="alert"></span>
        </div>

        <!-- Mobile -->
        <div class="elev8-field">
          <input type="tel" id="su-mobile" name="mobile" placeholder=" "
                 autocomplete="tel" maxlength="10" inputmode="numeric">
          <label for="su-mobile">Mobile Number (10 digits)</label>
          <span class="field-err" id="su-mobileErr" role="alert"></span>
        </div>

        <!-- Password + strength meter -->
        <div class="elev8-field">
          <input type="password" id="su-password" name="password" placeholder=" "
                 autocomplete="new-password">
          <label for="su-password">Password (min. 8 characters)</label>
          <div class="strength-track" aria-hidden="true">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="strength-label" id="strengthLabel" aria-live="polite"></span>
          <span class="field-err" id="su-passwordErr" role="alert"></span>
        </div>

        <!-- Program selection -->
        <div class="elev8-field plan-field">
          <p class="plan-field-label">Choose Your Program</p>
          <div class="plan-grid">
            <label class="plan-card">
              <input type="radio" name="plan" value="bft">
              <span class="plan-content">
                <strong class="plan-abbr">BFT</strong>
                <span class="plan-name">Bodyweight Functional Training</span>
                <span class="plan-price">from ₹2,100&thinsp;/&thinsp;mo</span>
              </span>
            </label>
            <label class="plan-card">
              <input type="radio" name="plan" value="cst">
              <span class="plan-content">
                <strong class="plan-abbr">CST</strong>
                <span class="plan-name">Calisthenics Skill Training</span>
                <span class="plan-price">from ₹2,300&thinsp;/&thinsp;mo</span>
              </span>
            </label>
          </div>
          <span class="field-err" id="su-planErr" role="alert"></span>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-1" id="signupBtn">
          Create Account
        </button>

        <p class="auth-switch">Already a member?
          <a href="sign_in.html">Sign in</a>
        </p>

      </form>
    </div><!-- /glass-card -->
  </div><!-- /auth-card -->
</main>
