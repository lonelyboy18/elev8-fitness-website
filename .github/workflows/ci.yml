name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: elev8
          POSTGRES_PASSWORD: elev8_test_password
          POSTGRES_DB: elev8_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U elev8 -d elev8_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      LOG_LEVEL: silent
      DATABASE_URL: postgresql://elev8:elev8_test_password@localhost:5432/elev8_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min_16_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_min_16_chars
      REFRESH_TOKEN_HASH_SECRET: ci_hash_secret_min_16_chars
      COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (source)
        run: npm run typecheck

      - name: Type check (tests)
        run: npm run typecheck:test

      - name: Lint
        run: npm run lint

      - name: Apply migrations
        run: npm run prisma:migrate:deploy

      - name: Run tests
        run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
